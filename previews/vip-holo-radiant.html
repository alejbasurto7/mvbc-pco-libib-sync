<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MVBC VIP Card &mdash; Radiant Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { min-height: 100%; }
body {
  background: radial-gradient(ellipse at top, #ECE6DA 0%, #D8D0BE 100%);
  font-family: 'Montserrat', system-ui, sans-serif;
  display: flex; align-items: center; justify-content: center;
  padding: 24px 20px; min-height: 100vh;
}
.badge {
  width: 100%; max-width: 380px;
  border-radius: 18px;
  box-shadow: 0 18px 48px rgba(0,0,0,0.45), 0 2px 6px rgba(0,0,0,0.25);
  padding: 28px; position: relative; overflow: hidden;
  background:
    repeating-linear-gradient(45deg, transparent 0 14px, rgba(195,170,124,0.04) 14px 15px),
    repeating-linear-gradient(-45deg, transparent 0 14px, rgba(195,170,124,0.04) 14px 15px),
    #2C2A2B;
}
.badge::before {
  content: ""; position: absolute;
  top: 10px; left: 10px; right: 10px; bottom: 10px;
  border-width: 2px;
  border-style: solid;
  border-color: #F5E0AC #6A5538 #6A5538 #F5E0AC;
  border-radius: 12px; pointer-events: none; z-index: 6;
}
.badge-inner { position: relative; padding: 14px 6px 4px; z-index: 1; }
.badge-head { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.wordmark { display: flex; align-items: center; gap: 10px; min-width: 0; }
.stripe-emblem {
  width: 32px; height: auto; flex-shrink: 0;
  filter: brightness(0) invert(1) sepia(0.08) hue-rotate(180deg);
}
.stripe-text { min-width: 0; }
.org {
  font-size: 9.5px; font-weight: 800; letter-spacing: 2px;
  text-transform: uppercase; line-height: 1.1;
}
.role {
  font-size: 13px; font-weight: 600; letter-spacing: 5px;
  text-transform: uppercase; margin-top: 3px;
  color: #C3AA7C; line-height: 1.1;
}
.vip-pill {
  border: 2px solid #C3AA7C; border-radius: 999px;
  padding: 6px 12px; font-size: 10px; font-weight: 800;
  letter-spacing: 2.5px; white-space: nowrap; line-height: 1;
  display: inline-flex; align-items: center; gap: 6px;
}
.vip-pill .star { font-size: 10px; line-height: 1; }
.vip-rule { height: 2px; background: #C3AA7C; margin: 18px 0 26px; border-radius: 1px; }
.name {
  text-align: center; font-size: 30px; font-weight: 700;
  margin-bottom: 8px; letter-spacing: -0.3px; line-height: 1.2;
}
.id {
  text-align: center; font-family: 'Open Sans', sans-serif;
  font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
  color: #C3AA7C; opacity: 0.85; margin-bottom: 26px;
}
.qr-wrap {
  border: 3px solid transparent;
  border-image: linear-gradient(135deg, #F5E0AC 0%, #C3AA7C 50%, #6A5538 100%) 1;
  padding: 10px; margin: 0 auto; width: 280px; height: 280px;
  position: relative; z-index: 7;
}
.qr-wrap img { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
.footer-row {
  margin-top: 20px; display: flex; justify-content: center;
}

.gilded {
  background: linear-gradient(135deg, #D4B27A 0%, #F5E0AC 35%, #C3AA7C 65%, #A8895E 100%);
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  filter: drop-shadow(0 1px 0 rgba(0,0,0,0.45));
}
.name.gilded { background-size: 200% 200%; background-position: 50% 50%; }
.vip-pill.gilded { color: transparent; border-color: #C3AA7C; }

/* --- Holo effect: Radiant Collection ---
   Adapted from simeydotme/pokemon-cards-css (MIT). Pointer-driven custom
   properties --pointer-x/y, --pointer-from-center/top/left, --card-opacity
   are set by the JS at the bottom. */
.holo-shine, .holo-glare {
  position: absolute; inset: 14px; border-radius: 10px;
  overflow: hidden; pointer-events: none;
}
.holo-shine { z-index: 4; transition: opacity 0.4s ease-out; }
.holo-glare { z-index: 5; transition: opacity 0.4s ease-out; }

.holo-shine {
  background-image:
    repeating-linear-gradient(135deg,
      hsl(0, 32%, 82%) 0%,
      hsl(40, 38%, 83%) 5%,
      hsl(120, 30%, 82%) 10%,
      hsl(200, 35%, 82%) 15%,
      hsl(280, 30%, 84%) 20%,
      hsl(0, 32%, 82%) 25%),
    radial-gradient(circle at var(--pointer-x, 50%) var(--pointer-y, 50%),
      hsla(0, 0%, 100%, 0.4) 5%,
      hsla(0, 0%, 100%, 0.08) 35%,
      hsla(0, 0%, 0%, 0.45) 85%);
  background-blend-mode: color-dodge;
  background-size: 200% 700%, 100% 100%;
  background-position:
    calc(100% * var(--pointer-from-left, 0.5)) calc(100% * var(--pointer-from-top, 0.5)),
    center;
  filter: brightness(0.75) contrast(1.4) saturate(0.85);
  mix-blend-mode: color-dodge;
  opacity: calc((1.0 * var(--card-opacity, 0)) - (1.4 * var(--pointer-from-center, 0)));
}

.holo-glare {
  background-image: radial-gradient(
    farthest-corner circle at var(--pointer-x, 50%) var(--pointer-y, 50%),
    hsla(0,0%,100%,0.3) 8%,
    hsla(0,0%,100%,0.1) 22%,
    hsla(0,0%,0%,0.5) 90%
  );
  filter: brightness(0.7) contrast(1.25);
  opacity: calc(var(--card-opacity, 0) * 0.45);
  mix-blend-mode: overlay;
}
.holo-glare::after {
  content: ""; position: absolute; inset: 0;
  background-image: radial-gradient(
    farthest-corner circle at var(--pointer-x, 50%) var(--pointer-y, 50%),
    hsla(0,0%,100%,0.4) 8%,
    hsla(0,0%,100%,0.15) 22%,
    hsla(0,0%,0%,0.35) 110%
  );
  filter: brightness(1) contrast(1.25);
  mix-blend-mode: overlay;
}

/* QR cutout mask — keeps shine off the QR rectangle */
.holo-shine, .holo-glare {
  -webkit-mask-image:
    linear-gradient(to right, #000 7%, transparent 10%, transparent 90%, #000 93%),
    linear-gradient(to bottom, #000 36%, transparent 39%, transparent 87%, #000 90%);
  -webkit-mask-composite: source-over;
  mask-image:
    linear-gradient(to right, #000 7%, transparent 10%, transparent 90%, #000 93%),
    linear-gradient(to bottom, #000 36%, transparent 39%, transparent 87%, #000 90%);
  mask-composite: add;
}

.effect-label {
  position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
  font-size: 11px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: #6A5538; opacity: 0.7;
  background: rgba(255,255,255,0.6); padding: 6px 14px;
  border-radius: 999px; backdrop-filter: blur(4px);
}
</style>

<script>
(function () {
  var badge = document.querySelector('.badge');
  if (!badge) return;
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function applyShine(xPct, yPct, opacity) {
    var fromCenter = clamp(
      Math.sqrt((xPct-50)*(xPct-50) + (yPct-50)*(yPct-50)) / 50, 0, 1
    );
    badge.style.setProperty('--pointer-x', xPct.toFixed(1) + '%');
    badge.style.setProperty('--pointer-y', yPct.toFixed(1) + '%');
    badge.style.setProperty('--pointer-from-center', fromCenter.toFixed(3));
    badge.style.setProperty('--pointer-from-top', (yPct/100).toFixed(3));
    badge.style.setProperty('--pointer-from-left', (xPct/100).toFixed(3));
    badge.style.setProperty('--card-opacity', opacity.toFixed(2));
  }
  var fadeTimer = null, orientFadeTimer = null;
  document.addEventListener('mousemove', function (e) {
    if (fadeTimer) { clearTimeout(fadeTimer); fadeTimer = null; }
    var rect = badge.getBoundingClientRect();
    var x = clamp((e.clientX - rect.left) / rect.width, 0, 1) * 100;
    var y = clamp((e.clientY - rect.top) / rect.height, 0, 1) * 100;
    applyShine(x, y, 1);
  });
  document.addEventListener('mouseleave', function () {
    if (fadeTimer) clearTimeout(fadeTimer);
    fadeTimer = setTimeout(function () { applyShine(50, 50, 0); }, 80);
  });
  function onOrient(e) {
    var gamma = e.gamma || 0, beta = e.beta || 0;
    var x = clamp((gamma + 25) / 50, 0, 1) * 100;
    var y = clamp((beta - 20) / 50, 0, 1) * 100;
    applyShine(x, y, 1);
    if (orientFadeTimer) clearTimeout(orientFadeTimer);
    orientFadeTimer = setTimeout(function () { applyShine(50, 50, 0); }, 1000);
  }
  if (typeof window.DeviceOrientationEvent !== 'undefined') {
    window.addEventListener('deviceorientation', onOrient);
  }
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    document.addEventListener('click', function () {
      DeviceOrientationEvent.requestPermission().catch(function(){});
    }, { once: true });
  }
  // Auto-animate so the effect is visible without a pointer (good for iframes).
  var t = 0;
  setInterval(function () {
    t += 0.02;
    var x = 50 + 40 * Math.sin(t);
    var y = 50 + 40 * Math.cos(t * 0.7);
    applyShine(x, y, 1);
  }, 40);
})();
</script>
