<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#113355">
  <title>MVBC Library</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      background: #F3F0EB;
      color: #2C2A2B;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      line-height: 1.5;
    }
    main { max-width: 420px; text-align: center; }
    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #C3AA7C;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 24px;
      color: #113355;
      margin: 0 0 16px;
      letter-spacing: 0.02em;
    }
    p { margin: 0 0 14px; }
    .rule {
      width: 64px; height: 3px; background: #C3AA7C;
      margin: 20px auto 24px;
    }
    a {
      color: #113355;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Mount Vernon Baptist Church</div>
    <h1>Library</h1>
    <div class="rule"></div>
    <p>
      This isn't a public site — each library card has its own private link.
    </p>
    <p>
      If you're an MVBC Library patron, open the link from your welcome email.
      Questions? Email <a href="mailto:familyministry@mvbchurch.org">familyministry@mvbchurch.org</a>.
    </p>
  </main>
</body>
</html>
