name: sync

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:           # allow manual trigger from the Actions tab

# Only one sync run at a time
concurrency:
  group: sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to commit state changes back to the state branch
      issues: write     # to open/comment the sync-alert issue on failed actions or orphans
    steps:
      - name: Checkout main (for code)
        uses: actions/checkout@v6
        with:
          ref: main
          path: code

      - name: Probe state branch existence
        id: state_probe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git ls-remote --exit-code --heads \
              "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
              state >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout existing state branch
        if: steps.state_probe.outputs.exists == 'true'
        uses: actions/checkout@v6
        with:
          ref: state
          path: state-checkout

      - name: Initialize state branch on first run
        if: steps.state_probe.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p state-checkout/state/sync_log
          cd state-checkout
          git init -b state
          git config user.email "actions@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          echo '{"version": 1, "updated_at": null, "rows": []}' > state/pending.json
          touch state/sync_log/.gitkeep
          git add .
          git commit -m "chore: initialize state branch"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push -u origin state

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        working-directory: code
        run: pip install -r requirements.txt

      - name: Capture pre-sync state HEAD
        id: pre_state
        working-directory: state-checkout
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Move state into code dir
        run: |
          rm -rf code/state
          mv state-checkout/state code/state

      - name: Run sync
        working-directory: code
        env:
          PCO_APP_ID: ${{ secrets.PCO_APP_ID }}
          PCO_SECRET: ${{ secrets.PCO_SECRET }}
          LIBIB_API_KEY: ${{ secrets.LIBIB_API_KEY }}
          LIBIB_API_USER: ${{ secrets.LIBIB_API_USER }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_REPLY_TO: ${{ secrets.EMAIL_REPLY_TO }}
          EMAIL_BACKEND: gmail
          STABILITY_HOURS: "24"
          LIBIB_LOGIN_URL: "https://www.libib.com/u/mvbchurch"
          BASELINE_MODE: ${{ vars.BASELINE_MODE || 'false' }}
          PROTECTED_TAGS: ${{ vars.PROTECTED_TAGS || 'ssm' }}
        run: python run.py

      - name: Commit state changes
        # Always restore state-checkout/state from code/state, even when the
        # sync step fails — otherwise the always() notify/alert steps below
        # see no pending.json (since this step is what moves it back).
        if: always()
        run: |
          # If sync crashed before moving state, there is nothing to put back.
          if [ -d code/state ]; then
            rm -rf state-checkout/state
            mv code/state state-checkout/state
          fi
          cd state-checkout
          git add state/
          if git diff --staged --quiet; then
            echo "No state changes; skipping commit."
          else
            git config user.email "actions@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git commit -m "[skip ci] sync state $(date -u +%FT%TZ)"
            git push origin state
          fi

      - name: Notify on action executions
        if: always()
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PRE_SYNC_SHA: ${{ steps.pre_state.outputs.sha }}
          GH_REPO: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_SERVER: ${{ github.server_url }}
        working-directory: state-checkout
        run: |
          python3 - <<'PY'
          import json, os, smtplib, ssl, subprocess, sys
          from email.mime.text import MIMEText

          pre = os.environ.get("PRE_SYNC_SHA", "").strip()
          post = subprocess.check_output(["git", "rev-parse", "HEAD"]).decode().strip()
          if not pre or pre == post:
              print("No state commit this run; nothing to notify.")
              sys.exit(0)

          try:
              prev = json.loads(subprocess.check_output(
                  ["git", "show", f"{pre}:state/pending.json"]).decode())
          except subprocess.CalledProcessError:
              prev = {"rows": []}
          curr = json.load(open("state/pending.json"))

          prev_idx = {(r["person_id"], r["action_type"]): r for r in prev["rows"]}
          curr_idx = {(r["person_id"], r["action_type"]): r for r in curr["rows"]}

          changes = []
          # Status flips on rows still present
          for key, r in curr_idx.items():
              old = prev_idx.get(key, {})
              if old.get("status") == "pending" and r["status"] in ("succeeded", "failed"):
                  changes.append({**r, "_outcome": r["status"]})
          # Rows that were pending and are now gone (succeeded + cleared)
          for key, r in prev_idx.items():
              if r.get("status") == "pending" and key not in curr_idx:
                  changes.append({**r, "_outcome": "succeeded (cleared)"})

          if not changes:
              print("State commit happened but no pending-status flips; not notifying.")
              sys.exit(0)

          def _describe(action_type, tgt):
              first = (tgt.get("first_name") or "").strip()
              last = (tgt.get("last_name") or "").strip()
              name = (first + " " + last).strip() or "?"
              email_addr = tgt.get("email") or ""
              if action_type == "CREATE_PATRON":
                  return f"{name} <{email_addr}> (welcome email + card sent)"
              if action_type == "FREEZE_PATRON":
                  return f"{name} <{email_addr}> (membership ended — patron frozen)"
              if action_type == "UNFREEZE_PATRON":
                  return f"{name} <{email_addr}> (returning member — patron reactivated)"
              if action_type == "UPDATE_FIRST_NAME":
                  old_first = (tgt.get("old_first_name") or "?").strip() or "?"
                  return f"first name: {old_first} -> {first or '?'} (now {name} <{email_addr}>)"
              if action_type == "UPDATE_LAST_NAME":
                  old_last = (tgt.get("old_last_name") or "?").strip() or "?"
                  return f"last name: {old_last} -> {last or '?'} (now {name} <{email_addr}>)"
              if action_type == "UPDATE_EMAIL":
                  old_email = tgt.get("old_email") or "?"
                  return f"{name}: <{old_email}> -> <{email_addr}>"
              return f"{name} <{email_addr}>"

          lines = []
          for c in changes:
              tgt = c.get("target", {}) or {}
              detail = _describe(c["action_type"], tgt)
              lines.append(f"  - {c['action_type']:<18} | {c['_outcome']:<22} | {detail}")

          run_url = f"{os.environ['GH_SERVER']}/{os.environ['GH_REPO']}/actions/runs/{os.environ['GH_RUN_ID']}"
          n = len(changes)
          n_failed = sum(1 for c in changes if c["_outcome"] == "failed")
          subject = f"[Libib sync] {n} action(s) executed" + (f" ({n_failed} failed)" if n_failed else "")
          body = (
              f"PCO->Libib sync executed {n} action(s) this run.\n\n"
              + "\n".join(lines)
              + f"\n\nRun: {run_url}\n"
          )

          gmail_user = os.environ["GMAIL_USER"]
          msg = MIMEText(body)
          msg["Subject"] = subject
          msg["From"] = gmail_user
          msg["To"] = gmail_user

          with smtplib.SMTP("smtp.gmail.com", 587) as s:
              s.starttls(context=ssl.create_default_context())
              s.login(gmail_user, os.environ["GMAIL_APP_PASSWORD"].replace(" ", ""))
              s.sendmail(gmail_user, [gmail_user], msg.as_string())
          print(f"Sent: {subject}")
          PY

      - name: Alert via GitHub issue if failed actions or orphans
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd state-checkout
          if [ ! -f state/pending.json ]; then
            echo "No state/pending.json (sync likely crashed before state was written); skipping alert."
            exit 0
          fi
          # Count failed rows in the latest pending.json
          FAILED=$(python3 -c "import json; d=json.load(open('state/pending.json')); print(sum(1 for r in d['rows'] if r.get('status')=='failed'))")
          # Count orphans logged this month
          MONTH=$(date -u +%Y-%m)
          ORPHANS=$(grep -c '"action": "ORPHAN_DETECTED"' "state/sync_log/${MONTH}.jsonl" 2>/dev/null) || ORPHANS=0
          if [ "$FAILED" -gt 0 ] || [ "$ORPHANS" -gt 0 ]; then
            TITLE="sync: $FAILED failed action(s), $ORPHANS orphan(s)"
            BODY="Auto-generated alert from sync workflow. See [the run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) and the state branch's pending.json + sync_log."
            EXISTING=$(gh issue list --state open --label sync-alert --json number,title --jq '.[0] | select(.) | "\(.number)\t\(.title)"')
            if [ -z "$EXISTING" ]; then
              gh issue create --title "$TITLE" --body "$BODY" --label sync-alert
            else
              EXISTING_NUM=$(echo "$EXISTING" | cut -f1)
              EXISTING_TITLE=$(echo "$EXISTING" | cut -f2-)
              # Only re-comment when counts changed, to avoid spamming every 15 min
              if [ "$TITLE" != "$EXISTING_TITLE" ]; then
                gh issue comment "$EXISTING_NUM" --body "Update: $TITLE — $(date -u +%FT%TZ)"
              fi
            fi
          fi
